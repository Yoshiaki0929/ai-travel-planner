<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel App — 管理ダッシュボード</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .card { background: white; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .kpi-value { font-size: 2rem; font-weight: 700; line-height: 1; }
    .kpi-label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .tab-active { border-bottom: 2px solid #6366f1; color: #6366f1; }
    #loading-overlay { backdrop-filter: blur(4px); }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Login screen -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
    <div class="card w-full max-w-md p-8">
      <div class="text-center mb-8">
        <div class="text-4xl mb-3">✈️</div>
        <h1 class="text-2xl font-bold text-slate-800">管理ダッシュボード</h1>
        <p class="text-slate-500 text-sm mt-1">Travel App Admin</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Supabase アクセストークン</label>
          <textarea
            id="token-input"
            rows="4"
            class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none"
            placeholder="Supabaseのユーザートークン（JWT）を貼り付けてください"
          ></textarea>
          <p class="text-xs text-slate-400 mt-1">ブラウザのデベロッパーツールでlocalStorageのsupabase.auth.tokenから取得できます</p>
        </div>
        <button
          onclick="login()"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors"
        >
          ログイン
        </button>
        <p id="login-error" class="text-red-500 text-sm text-center hidden"></p>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
      <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-2xl">✈️</span>
          <div>
            <h1 class="font-bold text-slate-800 leading-tight">Travel App</h1>
            <p class="text-xs text-slate-500">管理ダッシュボード</p>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <span id="admin-email" class="text-sm text-slate-500"></span>
          <button
            onclick="logout()"
            class="text-sm text-slate-500 hover:text-red-500 transition-colors border border-slate-200 rounded-lg px-3 py-1.5"
          >
            ログアウト
          </button>
        </div>
      </div>
    </header>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/70 flex items-center justify-center z-20 hidden">
      <div class="flex flex-col items-center gap-3">
        <div class="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
        <p class="text-slate-500 text-sm">データを読み込んでいます...</p>
      </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">

      <!-- Last updated -->
      <div class="flex items-center justify-between">
        <h2 class="text-xl font-bold text-slate-800">概要</h2>
        <div class="flex items-center gap-3">
          <span id="last-updated" class="text-xs text-slate-400"></span>
          <button
            onclick="loadDashboard()"
            class="text-sm bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1.5"
          >
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            更新
          </button>
        </div>
      </div>

      <!-- KPI Cards -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="card p-5">
          <div class="kpi-label text-slate-400 mb-3">総ユーザー数</div>
          <div class="kpi-value text-indigo-600" id="kpi-users">—</div>
          <div class="mt-2 text-xs text-slate-400">
            今週 <span id="kpi-users-week" class="font-semibold text-emerald-600">—</span>
            今月 <span id="kpi-users-month" class="font-semibold text-emerald-600">—</span>
          </div>
        </div>
        <div class="card p-5">
          <div class="kpi-label text-slate-400 mb-3">旅行プラン数</div>
          <div class="kpi-value text-violet-600" id="kpi-plans">—</div>
          <div class="mt-2 text-xs text-slate-400">保存済みプラン</div>
        </div>
        <div class="card p-5">
          <div class="kpi-label text-slate-400 mb-3">写真投稿数</div>
          <div class="kpi-value text-pink-600" id="kpi-photos">—</div>
          <div class="mt-2 text-xs text-slate-400">アップロード済み</div>
        </div>
        <div class="card p-5">
          <div class="kpi-label text-slate-400 mb-3">チャットメッセージ</div>
          <div class="kpi-value text-amber-600" id="kpi-messages">—</div>
          <div class="mt-2 text-xs text-slate-400">
            フレンド <span id="kpi-friendships" class="font-semibold text-slate-600">—</span> 組
          </div>
        </div>
      </div>

      <!-- Charts row -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <!-- User growth chart -->
        <div class="card p-6">
          <h3 class="font-semibold text-slate-700 mb-4">新規ユーザー推移 (過去30日)</h3>
          <div class="relative h-52">
            <canvas id="user-chart"></canvas>
          </div>
        </div>

        <!-- Content activity chart -->
        <div class="card p-6">
          <h3 class="font-semibold text-slate-700 mb-1">コンテンツ投稿推移 (過去30日)</h3>
          <div class="flex gap-4 mb-3 text-xs">
            <span class="flex items-center gap-1"><span class="inline-block w-3 h-1 bg-violet-500 rounded"></span>プラン</span>
            <span class="flex items-center gap-1"><span class="inline-block w-3 h-1 bg-pink-500 rounded"></span>写真</span>
            <span class="flex items-center gap-1"><span class="inline-block w-3 h-1 bg-amber-500 rounded"></span>メッセージ</span>
          </div>
          <div class="relative h-48">
            <canvas id="content-chart"></canvas>
          </div>
        </div>
      </div>

      <!-- Users table -->
      <div class="card">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between">
          <h3 class="font-semibold text-slate-700">最近の登録ユーザー</h3>
          <span id="users-count" class="text-xs text-slate-400"></span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left border-b border-slate-100">
                <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">ユーザー</th>
                <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">居住地</th>
                <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">登録日</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr>
                <td colspan="3" class="px-6 py-8 text-center text-slate-400">読み込み中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script>
    let token = '';
    let userChart = null;
    let contentChart = null;

    async function apiFetch(path) {
      const res = await fetch('/api/admin' + path, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) throw res;
      return res.json();
    }

    async function login() {
      const t = document.getElementById('token-input').value.trim();
      if (!t) return;
      token = t;
      const err = document.getElementById('login-error');
      err.classList.add('hidden');

      try {
        await loadDashboard();
      } catch (e) {
        token = '';
        err.textContent = e.status === 403 ? '管理者権限がありません' : '認証に失敗しました。トークンを確認してください。';
        err.classList.remove('hidden');
      }
    }

    function logout() {
      token = '';
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('token-input').value = '';
    }

    async function loadDashboard() {
      showLoading(true);
      try {
        const [overview, daily, content, users] = await Promise.all([
          apiFetch('/overview'),
          apiFetch('/stats/daily'),
          apiFetch('/stats/content'),
          apiFetch('/users'),
        ]);

        renderOverview(overview);
        renderUserChart(daily);
        renderContentChart(content);
        renderUsersTable(users);

        document.getElementById('last-updated').textContent =
          '最終更新: ' + new Date().toLocaleTimeString('ja-JP');

        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
      } finally {
        showLoading(false);
      }
    }

    function renderOverview(d) {
      setText('kpi-users', d.total_users.toLocaleString());
      setText('kpi-plans', d.total_plans.toLocaleString());
      setText('kpi-photos', d.total_photos.toLocaleString());
      setText('kpi-messages', d.total_messages.toLocaleString());
      setText('kpi-friendships', d.total_friendships.toLocaleString());
      setText('kpi-users-week', '+' + d.new_users_week);
      setText('kpi-users-month', '+' + d.new_users_month);
    }

    function renderUserChart(daily) {
      const labels = daily.map(d => {
        const dt = new Date(d.date);
        return (dt.getMonth() + 1) + '/' + dt.getDate();
      });
      const data = daily.map(d => d.new_users);

      if (userChart) userChart.destroy();
      userChart = new Chart(document.getElementById('user-chart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: '新規ユーザー',
            data,
            backgroundColor: 'rgba(99, 102, 241, 0.15)',
            borderColor: 'rgba(99, 102, 241, 0.8)',
            borderWidth: 1.5,
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { maxTicksLimit: 10, font: { size: 10 } } },
            y: { beginAtZero: true, ticks: { precision: 0, font: { size: 10 } }, grid: { color: 'rgba(0,0,0,.05)' } }
          }
        }
      });
    }

    function renderContentChart(content) {
      const labels = content.map(d => {
        const dt = new Date(d.date);
        return (dt.getMonth() + 1) + '/' + dt.getDate();
      });

      if (contentChart) contentChart.destroy();
      contentChart = new Chart(document.getElementById('content-chart'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'プラン',
              data: content.map(d => d.plans),
              borderColor: 'rgba(139, 92, 246, 0.8)',
              backgroundColor: 'rgba(139, 92, 246, 0.05)',
              fill: true,
              tension: 0.4,
              pointRadius: 0,
              borderWidth: 2,
            },
            {
              label: '写真',
              data: content.map(d => d.photos),
              borderColor: 'rgba(236, 72, 153, 0.8)',
              backgroundColor: 'rgba(236, 72, 153, 0.05)',
              fill: true,
              tension: 0.4,
              pointRadius: 0,
              borderWidth: 2,
            },
            {
              label: 'メッセージ',
              data: content.map(d => d.messages),
              borderColor: 'rgba(245, 158, 11, 0.8)',
              backgroundColor: 'rgba(245, 158, 11, 0.05)',
              fill: true,
              tension: 0.4,
              pointRadius: 0,
              borderWidth: 2,
            },
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { maxTicksLimit: 10, font: { size: 10 } } },
            y: { beginAtZero: true, ticks: { precision: 0, font: { size: 10 } }, grid: { color: 'rgba(0,0,0,.05)' } }
          }
        }
      });
    }

    function renderUsersTable(users) {
      document.getElementById('users-count').textContent =
        users.length + ' 件表示';

      const tbody = document.getElementById('users-tbody');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-8 text-center text-slate-400">ユーザーが見つかりません</td></tr>';
        return;
      }

      tbody.innerHTML = users.map((u, i) => {
        const name = u.display_name || '(未設定)';
        const city = u.home_city || '—';
        const date = u.created_at
          ? new Date(u.created_at).toLocaleDateString('ja-JP', { year: 'numeric', month: 'short', day: 'numeric' })
          : '—';
        const initials = name !== '(未設定)' ? name.charAt(0).toUpperCase() : '?';
        const colors = ['bg-indigo-100 text-indigo-700','bg-violet-100 text-violet-700','bg-pink-100 text-pink-700','bg-amber-100 text-amber-700','bg-emerald-100 text-emerald-700'];
        const color = colors[i % colors.length];
        return `
          <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
            <td class="px-6 py-3">
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full ${color} flex items-center justify-center text-sm font-semibold flex-shrink-0">${initials}</div>
                <div>
                  <div class="font-medium text-slate-700">${escHtml(name)}</div>
                  <div class="text-xs text-slate-400 font-mono">${u.user_id ? u.user_id.substring(0, 8) + '…' : ''}</div>
                </div>
              </div>
            </td>
            <td class="px-6 py-3 text-slate-500">${escHtml(city)}</td>
            <td class="px-6 py-3 text-slate-500">${date}</td>
          </tr>
        `;
      }).join('');
    }

    function showLoading(show) {
      document.getElementById('loading-overlay').classList.toggle('hidden', !show);
    }

    function setText(id, val) {
      document.getElementById(id).textContent = val;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Submit on Ctrl/Cmd+Enter in textarea
    document.getElementById('token-input').addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') login();
    });
  </script>
</body>
</html>
